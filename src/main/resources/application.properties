spring.application.name=tarefas-benchmark

server.port=8080

# Banco SQLite na pasta do usuario Windows (%USERPROFILE%\.tarefas-benchmark)
spring.datasource.url=jdbc:sqlite:${user.home}/.tarefas-benchmark/tarefas-benchmark.db
spring.datasource.driver-class-name=org.sqlite.JDBC
# SQLite permite apenas um escritor por vez
spring.datasource.hikari.maximum-pool-size=1
# Armazena datas como texto ISO no SQLite (evita erro de leitura de timestamp)
spring.datasource.hikari.data-source-properties.date_class=text

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Schema criado por script SQL simples e idempotente (schema.sql)
spring.sql.init.mode=always

# Abertura automatica do navegador padrao na inicializacao
app.abrirNavegador=true
